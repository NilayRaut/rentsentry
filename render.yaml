services:
  - type: web
    name: rentsentry
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: rentsentry-frontend
    runtime: static
    staticPublishPath: frontend
    buildCommand: ""
